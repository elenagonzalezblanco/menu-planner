name: Keep Alive — DB & App

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    environment: keep-alive
    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: 2f65786d-ad3f-480d-a0eb-a41d45de8135
          tenant-id: 16b3c013-d300-468d-ac64-7eda0820b6d3
          subscription-id: 5fd714fb-9dfc-4176-ac01-ef4087e8c47f

      - name: Ensure PostgreSQL is running
        run: |
          set +e
          RG=elenagbgpersonal
          PG=menu-planner-pg-elena2

          # Run show and capture both stdout and stderr to detect auth failures
          SHOW_OUTPUT=$(az postgres flexible-server show -g "$RG" -n "$PG" --query "state" -o tsv 2>&1)
          SHOW_EXIT=$?
          STATE=$(echo "$SHOW_OUTPUT" | grep -v "ERROR\|WARNING\|AuthorizationFailed\|error" | tr -d '[:space:]')

          if echo "$SHOW_OUTPUT" | grep -qi "AuthorizationFailed\|does not have authorization"; then
            echo "::error::RBAC permission missing for PostgreSQL read."
            echo "::error::Grant role 'Reader' + action 'Microsoft.DBforPostgreSQL/flexibleServers/start/action'"
            echo "::error::OR grant 'Contributor' on resource '$PG' to service principal 2f65786d-ad3f-480d-a0eb-a41d45de8135"
          fi

          echo "Initial DB state: '${STATE}'"
          NEEDS_APP_RESTART=0
          case "$STATE" in
            Ready)
              echo "DB already Ready."
              ;;
            Stopped|Disabled)
              echo "DB is $STATE - issuing start..."
              az postgres flexible-server start -g "$RG" -n "$PG" || echo "start returned non-zero"
              NEEDS_APP_RESTART=1
              ;;
            "")
              # Empty state = auth failure OR server unreachable.
              # Treat as potentially stopped: flag for app restart so the
              # health-check step can detect and recover.
              echo "::warning::Could not read DB state (likely auth failure or server unreachable). Will verify via health check."
              NEEDS_APP_RESTART=1
              ;;
            *)
              echo "DB transient state $STATE - waiting to settle."
              NEEDS_APP_RESTART=1
              ;;
          esac
          if [ "$NEEDS_APP_RESTART" = "1" ] && [ "$STATE" != "" ]; then
            for i in $(seq 1 24); do
              sleep 10
              STATE=$(az postgres flexible-server show -g "$RG" -n "$PG" --query "state" -o tsv 2>/dev/null | tr -d '[:space:]')
              echo "  [$i] DB state: $STATE"
              if [ "$STATE" = "Ready" ]; then break; fi
              if [ "$STATE" = "Stopped" ] || [ "$STATE" = "Disabled" ]; then
                echo "  settled to $STATE - issuing start..."
                az postgres flexible-server start -g "$RG" -n "$PG" || echo "  start returned non-zero"
              fi
            done
            if [ "$STATE" = "Ready" ]; then
              echo "DB Ready - restarting App Service..."
              RESTART_OUTPUT=$(az webapp restart --name micocina -g "$RG" -o none 2>&1)
              if echo "$RESTART_OUTPUT" | grep -qi "AuthorizationFailed\|does not have authorization"; then
                echo "::error::RBAC permission missing for App Service restart."
                echo "::error::Grant role 'Website Contributor' on App Service 'micocina' to service principal 2f65786d-ad3f-480d-a0eb-a41d45de8135"
              elif [ -n "$RESTART_OUTPUT" ]; then
                echo "::warning::App restart output: $RESTART_OUTPUT"
              else
                echo "App Service restart requested."
              fi
              sleep 20
            else
              echo "::warning::DB not Ready (last '$STATE'). Next run retries."
            fi
          fi
          exit 0

      - name: Verify real DB health and self-heal the App Service
        run: |
          set +e
          RG=elenagbgpersonal
          APP=micocina
          HEALTH_URL="https://${APP}.azurewebsites.net/api/healthz"

          # /api/healthz returns 200 only when the API can actually reach the DB.
          # (/healthz without /api returns the SPA index.html and is always 200,
          #  so it must NOT be used to detect outages.)
          check() { curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$HEALTH_URL" || echo "000"; }

          CODE=$(check)
          echo "DB health check (api/healthz): HTTP $CODE"
          if [ "$CODE" = "200" ]; then
            echo "App + DB healthy."
            exit 0
          fi

          # Unhealthy: DB is up (previous step guaranteed it) but the API's
          # connection pool is likely stale. Restart the App Service to recover.
          echo "::warning::Health check returned $CODE - restarting App Service to clear stale pool"
          RESTART_OUTPUT=$(az webapp restart --name "$APP" -g "$RG" -o none 2>&1)
          if echo "$RESTART_OUTPUT" | grep -qi "AuthorizationFailed\|does not have authorization"; then
            echo "::error::RBAC permission missing — cannot restart App Service '$APP'."
            echo "::error::Fix: in Azure Portal → App Service 'micocina' → Access control (IAM)"
            echo "::error::     Add role 'Website Contributor' to service principal 2f65786d-ad3f-480d-a0eb-a41d45de8135"
            echo "::error::App is unhealthy (HTTP $CODE) and cannot self-heal. Manual restart required."
            exit 0
          elif [ -n "$RESTART_OUTPUT" ]; then
            echo "::warning::Restart output: $RESTART_OUTPUT"
          fi

          # Give it time to come back, then re-check a few times.
          for i in $(seq 1 12); do
            sleep 15
            CODE=$(check)
            echo "  [$i] post-restart health: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "Recovered after restart."
              exit 0
            fi
          done

          echo "::error::App still unhealthy after restart (last HTTP $CODE). Next scheduled run will retry."
          # Do not fail the job: keep the schedule self-healing on the next tick.
          exit 0
