name: Keep Alive — DB & App

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    environment: keep-alive
    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: 2f65786d-ad3f-480d-a0eb-a41d45de8135
          tenant-id: 16b3c013-d300-468d-ac64-7eda0820b6d3
          subscription-id: 5fd714fb-9dfc-4176-ac01-ef4087e8c47f

      - name: Ensure PostgreSQL is running
        run: |
          set +e
          RG=elenagbgpersonal
          PG=menu-planner-pg-elena
          get_state() { az postgres flexible-server show -g "$RG" -n "$PG" --query "state" -o tsv 2>/dev/null; }
          STATE=$(get_state)
          echo "Initial DB state: $STATE"
          NEEDS_APP_RESTART=0
          case "$STATE" in
            Ready)
              echo "DB already Ready."
              ;;
            Stopped|Disabled)
              echo "DB is $STATE - issuing start..."
              az postgres flexible-server start -g "$RG" -n "$PG" || echo "start returned non-zero"
              NEEDS_APP_RESTART=1
              ;;
            "")
              echo "::warning::Could not read DB state. Skipping."
              ;;
            *)
              echo "DB transient state $STATE - waiting to settle."
              NEEDS_APP_RESTART=1
              ;;
          esac
          if [ "$NEEDS_APP_RESTART" = "1" ]; then
            for i in $(seq 1 24); do
              sleep 10
              STATE=$(get_state)
              echo "  [$i] DB state: $STATE"
              if [ "$STATE" = "Ready" ]; then break; fi
              if [ "$STATE" = "Stopped" ] || [ "$STATE" = "Disabled" ]; then
                echo "  settled to $STATE - issuing start..."
                az postgres flexible-server start -g "$RG" -n "$PG" || echo "  start returned non-zero"
              fi
            done
          fi
          if [ "$STATE" = "Ready" ]; then
            if [ "$NEEDS_APP_RESTART" = "1" ]; then
              echo "DB Ready - restarting App Service..."
              az webapp restart --name micocina -g "$RG" -o none || echo "::warning::App restart failed"
              sleep 20
            fi
          else
            echo "::warning::DB not Ready (last $STATE). Next run retries."
          fi
          exit 0

      - name: Verify real DB health and self-heal the App Service
        run: |
          set +e
          RG=elenagbgpersonal
          APP=micocina
          HEALTH_URL="https://${APP}.azurewebsites.net/api/healthz"

          # /api/healthz returns 200 only when the API can actually reach the DB.
          # (/healthz without /api returns the SPA index.html and is always 200,
          #  so it must NOT be used to detect outages.)
          check() { curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$HEALTH_URL" || echo "000"; }

          CODE=$(check)
          echo "DB health check (api/healthz): HTTP $CODE"
          if [ "$CODE" = "200" ]; then
            echo "App + DB healthy."
            exit 0
          fi

          # Unhealthy: DB is up (previous step guaranteed it) but the API's
          # connection pool is likely stale. Restart the App Service to recover.
          echo "::warning::Health check returned $CODE - restarting App Service to clear stale pool"
          az webapp restart --name "$APP" -g "$RG" -o none || echo "::warning::App restart failed"

          # Give it time to come back, then re-check a few times.
          for i in $(seq 1 12); do
            sleep 15
            CODE=$(check)
            echo "  [$i] post-restart health: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "Recovered after restart."
              exit 0
            fi
          done

          echo "::error::App still unhealthy after restart (last HTTP $CODE). Next scheduled run will retry."
          # Do not fail the job: keep the schedule self-healing on the next tick.
          exit 0
