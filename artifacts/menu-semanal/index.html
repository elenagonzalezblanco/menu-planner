<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Handle GitHub Pages SPA redirect
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location))
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16a34a" />

    <!-- SEO -->
    <title>Planificador de Menú Semanal</title>
    <meta name="description" content="Planifica tu menú semanal, gestiona recetas y genera tu lista de la compra fácilmente." />
    <meta name="keywords" content="menú semanal, recetas, lista compra, planificador comidas" />
    <link rel="canonical" href="https://micocina.azurewebsites.net/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Planificador de Menú Semanal" />
    <meta property="og:description" content="Planifica tu menú semanal, gestiona recetas y genera tu lista de la compra." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Menú Semanal" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'">

  </head>
