services:
  - type: web
    name: menu-planner-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: menu-planner-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: AZURE_TENANT_ID
        value: "16b3c013-d300-468d-ac64-7eda0820b6d3"
      - key: AZURE_CLIENT_ID
        value: "2f65786d-ad3f-480d-a0eb-a41d45de8135"
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: AZURE_OPENAI_BASE_URL
        value: "https://menuplanner3-resource.services.ai.azure.com/api/projects/menuplanner3/openai/v1"
      - key: AZURE_OPENAI_MODEL
        value: "gpt-4o"

databases:
  - name: menu-planner-db
    plan: free
    databaseName: menu_planner
